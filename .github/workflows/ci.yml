# Simple CI pipeline: validates PHP syntax and ensures build passes

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PHP
        run: |
          sudo apt-get update
          sudo apt-get install -y php8.1-cli php8.1-mysql

      - name: Check PHP version
        run: php -v

      - name: Validate PHP syntax
        run: find . -name "*.php" -exec php -l {} \;