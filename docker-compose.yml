# Defines full stack: nginx + php + mariadb
# Keeps environment reproducible and easy to deploy locally or in CI

services:

  nginx:
    image: nginx:mainline-alpine-slim
    container_name: pc_parts_nginx
    ports:
      - "8080:80" # expose web app on localhost:8080
    volumes:
      - ./public:/var/www/html # PHP entrypoint files
      - ./nginx.conf:/etc/nginx/conf.d/default.conf # custom nginx config
    depends_on:
      - php

  php:
    build: .
    container_name: pc_parts_php
    volumes:
      - .:/var/www/html # full project mounted for development
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    depends_on:
      - db

  db:
    image: mariadb:lts
    container_name: pc_parts_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD} # root password from .env
      MYSQL_DATABASE: ${DB_NAME}              # auto-created DB
      MYSQL_USER: ${DB_USER}                  # app user
      MYSQL_PASSWORD: ${DB_PASS}              # app password
    ports:
      - "3306:3306" # optional external DB access
    volumes:
      - pc_parts_db_data:/var/lib/mysql # persistent storage
      - ./sql:/docker-entrypoint-initdb.d

volumes:
  pc_parts_db_data: